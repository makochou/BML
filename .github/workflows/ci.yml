name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Test backend
        working-directory: bml-backend
        run: mvn -q clean test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bml-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: bml-frontend
        run: npm ci

      - name: Build frontend
        working-directory: bml-frontend
        run: npm run build

      - name: Test frontend
        working-directory: bml-frontend
        run: npm run test
