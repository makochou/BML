<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 极光幻彩背景，深空微光 -->
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#140638" />
      <stop offset="60%" stop-color="#070217" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- 幻彩色：品红、青蓝、亮橙渐变 -->
    <linearGradient id="crystalGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007a"/>
      <stop offset="50%" stop-color="#7928ca"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <linearGradient id="crystalGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8a00"/>
      <stop offset="50%" stop-color="#e52e71"/>
      <stop offset="100%" stop-color="#9a00e6"/>
    </linearGradient>

    <!-- 柔和与刺目的双重发光滤镜 -->
    <filter id="hyperGlow" x="-50%" y="-50%" width="200%" height="200%">
      <!-- 主漫反射 -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur1" />
      <feFlood flood-color="#ff007a" flood-opacity="0.5" result="flood1" />
      <feComposite in="flood1" in2="blur1" operator="in" result="glow1" />
      
      <!-- 锐利高光 -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur2" />
      <feFlood flood-color="#00d4ff" flood-opacity="0.8" result="flood2" />
      <feComposite in="flood2" in2="blur2" operator="in" result="glow2" />
      
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="glow2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- 拟态玻璃高光反射滤镜 -->
    <filter id="glassReflect" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="15" stdDeviation="10" flood-color="#000000" flood-opacity="0.9" />
      <feSpecularLighting in="SourceAlpha" surfaceScale="5" specularConstant="1" specularExponent="30" lighting-color="#ffffff" result="specOut">
        <fePointLight x="100" y="-50" z="200" />
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut" />
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
    </filter>
  </defs>

  <style>
    /* 复杂且细腻的神经脉络呼吸动效 */
    .pulse-optic {
      animation: pulseOpticAnim 6s ease-in-out infinite alternate;
    }
    .spin-slow {
      animation: spinAnim 20s linear infinite;
      transform-origin: 256px 256px;
    }
    .spin-reverse {
      animation: spinReverseAnim 15s linear infinite;
      transform-origin: 256px 256px;
    }
    .hover-crystal {
      animation: hoverCrystalAnim 8s ease-in-out infinite;
    }
    @keyframes pulseOpticAnim {
      0% { opacity: 0.3; stroke-width: 1; }
      100% { opacity: 1; stroke-width: 4; filter: brightness(1.5); }
    }
    @keyframes spinAnim {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinReverseAnim {
      0% { transform: rotate(360deg) scale(0.9); }
      50% { transform: rotate(180deg) scale(1.1); }
      100% { transform: rotate(0deg) scale(0.9); }
    }
    @keyframes hoverCrystalAnim {
      0% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
      100% { transform: translateY(0px) scale(1); }
    }
  </style>

  <!-- 宇宙深海色底层背景 -->
  <rect width="512" height="512" rx="120" fill="url(#spaceBg)" />

  <!-- 动态神经网络与轨道光圈，展示中台系统"枢纽"的概念 -->
  <g class="spin-slow" opacity="0.6">
    <circle cx="256" cy="256" r="220" fill="none" stroke="url(#crystalGradient1)" stroke-width="2" stroke-dasharray="10 30 50 20"/>
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#crystalGradient2)" stroke-width="4" stroke-dasharray="80 40 20 60" opacity="0.8"/>
  </g>
  <g class="spin-reverse" opacity="0.4">
    <circle cx="256" cy="256" r="190" fill="none" stroke="#ff007a" stroke-width="1.5" stroke-dasharray="5 15"/>
    <polygon points="256,40 450,150 450,360 256,470 60,360 60,150" fill="none" stroke="url(#crystalGradient1)" stroke-width="1" />
  </g>

  <!-- 放射状的 AI 激活脉络 -->
  <g stroke="url(#crystalGradient2)" stroke-linecap="round" class="pulse-optic">
    <line x1="256" y1="256" x2="60" y2="150" />
    <line x1="256" y1="256" x2="450" y2="150" />
    <line x1="256" y1="256" x2="256" y2="470" />
    <line x1="256" y1="256" x2="80" y2="360" />
    <line x1="256" y1="256" x2="430" y2="360" />
    <line x1="256" y1="256" x2="256" y2="40" />
  </g>

  <!-- 核心幻彩三维水晶立方 -->
  <g class="hover-crystal" filter="url(#hyperGlow)">
    <g filter="url(#glassReflect)" transform="translate(256, 260)">
      <!-- 左后方面 -->
      <path d="M -110 -20 L 0 -80 L 0 60 L -110 120 Z" fill="url(#crystalGradient1)" opacity="0.85" />
      <!-- 右后方面 -->
      <path d="M 0 -80 L 110 -20 L 110 120 L 0 60 Z" fill="url(#crystalGradient2)" opacity="0.95" />
      <!-- 顶面 -->
      <path d="M -110 -20 L 0 -80 L 110 -20 L 0 40 Z" fill="rgba(255,255,255,0.3)" />
      
      <!-- 纯净空灵的字母 BML -->
      <text x="0" y="45" font-family="'Inter', 'Roboto', sans-serif" font-weight="900" font-size="70" fill="#ffffff" text-anchor="middle" letter-spacing="3" transform="scale(1, 1.2)">BML</text>
    </g>
  </g>

  <!-- 上方悬浮的数据光球核心 -->
  <circle cx="256" cy="120" r="16" fill="#ffffff" filter="url(#hyperGlow)" class="hover-crystal" style="animation-delay: -4s;" />
  <circle cx="160" cy="380" r="10" fill="url(#crystalGradient1)" filter="url(#hyperGlow)" class="hover-crystal" style="animation-delay: -2s;" />
  <circle cx="350" cy="380" r="12" fill="url(#crystalGradient2)" filter="url(#hyperGlow)" class="hover-crystal" style="animation-delay: -6s;" />

</svg>
