spring:
  application:
    name: bml-backend
    version: "@project.version@"
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${BML_DB_URL:jdbc:mariadb://localhost:3306/bml_system?useUnicode=true&characterEncoding=utf-8&useSSL=false}
    username: ${BML_DB_USERNAME:root}
    password: ${BML_DB_PASSWORD:sa@123}
  data:
    redis:
      host: ${BML_REDIS_HOST:localhost}
      port: ${BML_REDIS_PORT:6379}
      password: ${BML_REDIS_PASSWORD:}
      database: ${BML_REDIS_DATABASE:0}

server:
  port: ${BML_SERVER_PORT:8080}
  servlet:
    context-path: /api
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

management:
  server:
    port: ${BML_MANAGEMENT_PORT:18080}
    address: ${BML_MANAGEMENT_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    banner: false
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

bml:
  swagger:
    enabled: ${BML_SWAGGER_ENABLED:false}
  web:
    cors:
      allowed-origin-patterns:
        - ${BML_CORS_ALLOWED_ORIGIN_1:http://localhost:5173}
        - ${BML_CORS_ALLOWED_ORIGIN_2:http://127.0.0.1:5173}
  jwt:
    secret: ${BML_JWT_SECRET:local-dev-jwt-secret-change-me-please-1234567890}
    access-token-expiration: 7200000
    refresh-token-expiration: 604800000
  openapi:
    nonce-ttl-ms: ${BML_OPENAPI_NONCE_TTL_MS:300000}
    secret-encryption-key: ${BML_OPENAPI_SECRET_ENCRYPTION_KEY:local-openapi-encryption-key-change-me}
  monitor:
    refresh-interval-ms: ${BML_MONITOR_REFRESH_INTERVAL_MS:3000}
    public-ip-enabled: ${BML_MONITOR_PUBLIC_IP_ENABLED:false}
    public-ip-provider-url: ${BML_MONITOR_PUBLIC_IP_PROVIDER_URL:http://checkip.amazonaws.com}
