spring:
  application:
    name: bml-backend
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/bml_system?useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: root
    password: sa@123
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

server:
  port: 8080
  servlet:
    context-path: /api

  mvc:
    throw-exception-if-no-handler-found: true # 404 时抛出 NoHandlerFoundException
  web:
    resources:
      add-mappings: false # 禁止静态资源映射 (纯后端API项目规范)

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

bml:
  swagger:
    # 生产环境默认关闭，需显式开启
    enabled: false
  jwt:
    # JWT 签名密钥（至少32字节，生产环境请使用环境变量或配置中心管理）
    secret: "BmlJwtSecretKeyMustBeAtLeast32BytesLongForHS256Algorithm!"
    # AccessToken 过期时间: 2小时（毫秒）
    access-token-expiration: 7200000
    # RefreshToken 过期时间: 7天（毫秒）
    refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics" # 暴露核心监控端点 (health匿名, 其他需Token)
